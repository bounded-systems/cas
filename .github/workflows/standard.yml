# The one workflow. Opts into org-standard behaviors; all logic lives in the
# reusable bounded-systems/.github/.github/workflows/repo-standard.yml.
name: standard
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  standard:
    uses: bounded-systems/.github/.github/workflows/repo-standard.yml@c2576d22576bde7e2162d3d4b3e55cf7de995cb9
    with:
      security: true
      test: true
      runtime: bun
      test-command: "bun install --frozen-lockfile && bun run build && bun test && bunx jsr publish --dry-run --allow-slow-types"
